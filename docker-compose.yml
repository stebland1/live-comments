services:
  db:
    image: postgres:18-alpine
    container_name: lcom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LCOM_PG_USER}
      POSTGRES_PASSWORD: ${LCOM_PG_PASSWORD}
      POSTGRES_DB: ${LCOM_PG_DB}
    ports:
      - "${LCOM_PG_PORT}:5432"
    volumes:
      - "db-data:/var/lib/postgresql"

volumes:
  db-data:
