services:
  db:
    image: postgres:18-alpine
    container_name: lcom-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${LCOM_PG_ROOT_USER}
      POSTGRES_PASSWORD: ${LCOM_PG_ROOT_PASSWORD}
      POSTGRES_DB: ${LCOM_PG_DB}
      POSTGRES_APP_USER: ${LCOM_PG_APP_USER}
      POSTGRES_APP_PASSWORD: ${LCOM_PG_APP_PASSWORD}
    ports:
      - "${LCOM_PG_PORT}:5432"
    volumes:
      - ./db-init/:/docker-entrypoint-initdb.d/
      - "db-data:/var/lib/postgresql"

volumes:
  db-data:
